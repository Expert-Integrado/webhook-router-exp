name = "webhook-router-exp"
main = "src/index.ts"
compatibility_date = "2026-07-01"

[assets]
directory = "public"
binding = "ASSETS"
run_worker_first = ["/in/*", "/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "webhook-router"
database_id = "96a12d9f-fa29-4c9c-8e1a-c37b22967e41"

[triggers]
crons = ["* * * * *", "0 3 * * *"]
